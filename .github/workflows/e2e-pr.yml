name: E2E tests
on:
  pull_request:
  # Post-merge backstop: run e2e against the persistent pr-base Railway
  # env after every commit to main. pr-base has the same preview-style
  # layout (including Mailpit) so the existing test suite works against
  # it unchanged. This catches regressions that slipped through PR e2e
  # due to the silent-failure scenarios documented on the
  # "Find Railway preview deployment" step below.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      env_name:
        description: "Railway env name, e.g. 'ePDS / ePDS-pr-48' or 'ePDS / pr-3897f1-47' (as shown in the Railway PR comment)"
        required: true
        type: string

# Cancel any in-progress run for the same PR/ref when a newer push lands,
# so rapid consecutive pushes don't pile up runs on stale commits.
concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # actions:read is needed by dorny/test-reporter to look up the
      # workflow run it's attaching the check to.
      actions: read
      pull-requests: read
      # dorny/test-reporter creates a check run on the head SHA, which
      # needs checks:write.
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium

      - name: Resolve target SHA
        id: sha
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            push|workflow_dispatch)
              echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unexpected event: ${{ github.event_name }}"
              exit 1
              ;;
          esac

      # ------------------------------------------------------------
      # KNOWN LIMITATION — possible silent failure on pull_request
      # ------------------------------------------------------------
      # The step below decides whether to wait for a fresh Railway
      # rebuild OR to fall back to an existing deployment by
      # *observing* what Railway actually does: "did a deployment
      # record for this SHA appear within 20 seconds?" If yes, wait
      # for it to finish; if no, assume Railway correctly decided not
      # to rebuild and fall back to the newest existing deployment in
      # the target environment.
      #
      # This is a HEURISTIC, not a guarantee. If Railway's webhook /
      # deployment-API pipeline is delayed, broken, or silently drops
      # an event — or if Railway genuinely should have rebuilt but
      # didn't due to a bug in their watchPatterns matcher — the
      # 20-second grace window will conclude "no rebuild coming" and
      # fall back to a previous deployment. Tests then run against a
      # stale image and silently pass even though the new code was
      # never actually exercised. A regressing push is especially
      # dangerous: broken code goes green because the old env still
      # works. The failure mode is SILENT and BIASED TOWARD PASSING.
      #
      # Blast radius is reduced (but not eliminated) by the post-merge
      # backstop run on push-to-main, which re-tests the merged code
      # against the persistent pr-base Railway env. If a PR's e2e
      # silently passed against a stale preview and a regression
      # landed, the post-merge run catches it — unless the same
      # silent-failure scenario recurs on the merge commit, which is
      # possible if Railway's pipeline is broadly broken rather than
      # intermittently flaky.
      #
      # The only fully-correct fix is to re-derive Railway's rebuild
      # decision ourselves by parsing each service's watchPatterns
      # from railway.toml and matching the `git diff` against them,
      # so we can definitively say "we expect a rebuild" or "we
      # don't" without observing Railway at all. Tracked in:
      #
      #   https://github.com/hypercerts-org/ePDS/issues/57
      #
      # Until that lands, the 20-second window is the honest
      # trade-off: correct enough in the common case, explicitly
      # documented in the failure mode.
      # ------------------------------------------------------------
      - name: Find Railway deployment
        # Skipped on workflow_dispatch, which is the manual-retrigger
        # escape hatch: the caller supplies env_name and is responsible
        # for knowing the Railway env is already up.
        if: github.event_name != 'workflow_dispatch'
        id: wait-deploy
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.sha.outputs.sha }}
          # Only set on pull_request — unused on push.
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT: ${{ github.event_name }}
        run: |
          # Pick a Railway deployment to test against.
          #
          # Preferred: a deployment on *this* SHA. If the current push
          # touched a path in Railway's watchPatterns, Railway will
          # rebuild and such a deployment will exist (eventually) —
          # poll for it to reach success so we test against the freshly
          # built image.
          #
          # Fallback: the newest Railway deployment in the target
          # environment, regardless of SHA. That's whatever env is
          # currently running for this PR (pull_request) or is
          # currently running on main (push). If the current commit
          # doesn't touch a watched path, nothing changed from
          # Railway's perspective and the last deployment is still
          # accurate.
          #
          # The filter differs by event type:
          #   - pull_request: transient preview env for this PR.
          #     Railway uses two name formats ("ePDS / ePDS-pr-55"
          #     normally, "ePDS / pr-3897f1-55" on collision), both
          #     ending in "-<PR number>", so we match by suffix.
          #   - push: the persistent pr-base env, which is the
          #     post-merge backstop. Filter by exact environment name.
          #
          # NOTE: the GitHub deployments API's `ref` query parameter
          # matches the deployment's `ref` field, which Railway
          # populates with the commit SHA, NOT the branch name —
          # so `?ref=<branch-name>` silently returns zero results.
          # Instead we use the `environment` query parameter (exact
          # match only) for the push case, and for pull_request we
          # query by SHA in the preferred path and rely on the
          # environment-name filter in the fallback path.
          #
          # Strict fallback policy applies to both: only the NEWEST
          # deployment counts. If it's failure/error/inactive we
          # hard-fail rather than walking back to find an older
          # success, because that would silently mask a broken env.
          #
          # Railway deploys on this repo typically land in ~1 minute;
          # a 3-minute cap (36 × 5s) is 3× headroom. The grace period
          # before giving up on the SHA-specific lookup is 20s, which
          # is well beyond the typical latency between a GHA push
          # event and Railway's first deployment record appearing.

          GRACE_ATTEMPTS=4   # 4 × 5s = 20 seconds
          MAX_ATTEMPTS=36    # 36 × 5s = 3 minutes

          # Filters that select deployments matching the target env
          # for the current event.
          case "$EVENT" in
            pull_request)
              # Match any Railway transient env whose name ends in
              # "-<PR number>". Covers both "ePDS / ePDS-pr-55" and
              # "ePDS / pr-3897f1-55".
              SHA_FILTER=".creator.login == \"railway-app[bot]\" and .transient_environment == true and (.environment | endswith(\"-$PR_NUMBER\"))"
              FALLBACK_URL="repos/${{ github.repository }}/deployments?per_page=100"
              FALLBACK_FILTER="$SHA_FILTER"
              TARGET_DESC="PR #$PR_NUMBER preview"
              ;;
            push)
              # Persistent pr-base env. The `environment` query parameter
              # is an exact-match filter — much more efficient than
              # pulling down all deployments and filtering client-side.
              SHA_FILTER='.creator.login == "railway-app[bot]" and .environment == "ePDS / pr-base"'
              FALLBACK_URL="repos/${{ github.repository }}/deployments?environment=ePDS%20%2F%20pr-base&per_page=10"
              FALLBACK_FILTER='.creator.login == "railway-app[bot]"'
              TARGET_DESC="pr-base env"
              ;;
            *)
              echo "::error::Unexpected event: $EVENT"
              exit 1
              ;;
          esac

          find_deploy_for_sha() {
            gh api "repos/${{ github.repository }}/deployments?sha=$SHA" \
              --jq "map(select($SHA_FILTER))[0]"
          }

          find_newest_deploy() {
            gh api "$FALLBACK_URL" \
              --jq "map(select($FALLBACK_FILTER))[0]"
          }

          latest_state_of() {
            local id=$1
            gh api "repos/${{ github.repository }}/deployments/$id/statuses" \
              --jq '.[0].state // "pending"'
          }

          for i in $(seq 1 $MAX_ATTEMPTS); do
            deploy_json=$(find_deploy_for_sha)
            if [ -z "$deploy_json" ] || [ "$deploy_json" = "null" ]; then
              state=none
            else
              deploy_id=$(echo "$deploy_json" | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')
              state=$(latest_state_of "$deploy_id")
            fi
            echo "  attempt $i/$MAX_ATTEMPTS (SHA $SHA, $TARGET_DESC): state=$state"

            if [ "$state" = "success" ]; then
              env_name=$(echo "$deploy_json" | python3 -c 'import sys,json;print(json.load(sys.stdin)["environment"])')
              echo "✓ Railway deployment on this SHA is ready — environment: $env_name"
              echo "env_name=$env_name" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$state" = "failure" ] || [ "$state" = "error" ]; then
              echo "::error::Railway deployment for $SHA failed (state=$state)"
              exit 1
            fi

            # Grace period: if no Railway deployment exists at all for
            # this SHA after 20s, the push doesn't touch any watched
            # path. Fall back to the NEWEST deployment in the target
            # environment. Strict policy: we only accept the newest
            # one. If it's a failure or unexpected state, hard-fail
            # rather than walking back to find an older success,
            # because that would mask a genuinely broken env.
            if [ "$state" = "none" ] && [ "$i" -ge "$GRACE_ATTEMPTS" ]; then
              echo "::notice::No Railway deployment for $SHA after $((GRACE_ATTEMPTS * 5))s — push doesn't touch any watched path. Falling back to newest deployment in $TARGET_DESC."
              newest=$(find_newest_deploy)
              if [ -z "$newest" ] || [ "$newest" = "null" ]; then
                echo "::error::No Railway deployments exist for $TARGET_DESC at all. Is this a brand-new context whose first deploy hasn't landed yet? Push a change under one of Railway's watchPatterns to force a fresh build, or retrigger manually via workflow_dispatch once Railway's env is up."
                exit 1
              fi
              newest_id=$(echo "$newest" | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')
              newest_sha=$(echo "$newest" | python3 -c 'import sys,json;print(json.load(sys.stdin)["sha"])')
              newest_state=$(latest_state_of "$newest_id")
              echo "  newest deployment in $TARGET_DESC: id=$newest_id sha=${newest_sha:0:12} state=$newest_state"

              case "$newest_state" in
                success)
                  env_name=$(echo "$newest" | python3 -c 'import sys,json;print(json.load(sys.stdin)["environment"])')
                  echo "✓ Using existing Railway deployment — environment: $env_name (sha ${newest_sha:0:12})"
                  echo "env_name=$env_name" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
                in_progress|queued|pending)
                  # The newest deployment in the target env is still
                  # being built. That's a deploy from an earlier push
                  # that hasn't finished yet. Wait for it inside the
                  # remaining outer-loop budget rather than falling
                  # through to older successes — if we used an older
                  # one we'd risk returning stale results for ~a
                  # minute while the fresh build is imminently ready.
                  echo "::notice::Newest Railway deployment in $TARGET_DESC (sha ${newest_sha:0:12}) is still $newest_state. Continuing to wait within the 3-minute budget."
                  # Don't exit — fall out of the if-block, sleep, and
                  # re-enter the outer loop. Next iteration will find
                  # no SHA-specific deploy (still), hit the grace
                  # period again (already past), and re-check. If it
                  # flips to success, we'll use it; if to failure,
                  # we'll hard-fail; if it stays in_progress until
                  # the 3-minute cap, we'll hit the outer timeout.
                  ;;
                failure|error)
                  echo "::error::Newest Railway deployment in $TARGET_DESC (sha ${newest_sha:0:12}) is in '$newest_state' state. The env is broken — fix the underlying failure or retrigger a Railway build. Refusing to fall back to an older successful deploy because that would silently hide the broken state."
                  exit 1
                  ;;
                inactive)
                  # GitHub marks deployments 'inactive' when a newer
                  # one supersedes them for the same environment. The
                  # newest entry being 'inactive' is unusual — it
                  # could mean Railway's webhook-to-API plumbing is
                  # lagging. Fail rather than guess.
                  echo "::error::Newest Railway deployment in $TARGET_DESC is 'inactive', which is unexpected for the most recent deployment. Check Railway's deployment history and retry."
                  exit 1
                  ;;
                *)
                  echo "::error::Newest Railway deployment in $TARGET_DESC is in unknown state '$newest_state'. Refusing to proceed."
                  exit 1
                  ;;
              esac
            fi

            sleep 5
          done
          echo "::error::Railway deployment for $SHA did not reach success within 3 minutes."
          exit 1

      - name: Derive service URLs
        id: urls
        env:
          # On workflow_dispatch we read the env name from inputs; on
          # pull_request we read it from the wait-deploy step's output,
          # which is the Railway deployment's `environment` field
          # ("ePDS / ePDS-pr-48" or the collision-avoidance form
          # "ePDS / pr-3897f1-47").
          # See: https://station.railway.com/questions/pr-environment-name-format-change-causin-9aaa904f
          FULL_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.env_name || steps.wait-deploy.outputs.env_name }}
        run: |
          # Railway's autogenerated *.up.railway.app domains are built as
          # <service-slug>-<env-name>.up.railway.app, with both parts lowercased
          # and the scope prefix stripped from the service name. Derive URLs
          # from the live env name rather than templating off the PR number,
          # so both naming formats work without a Railway API lookup.
          if [[ "$FULL_ENV" != *" / "* ]]; then
            echo "::error::Unexpected deployment environment format: $FULL_ENV"
            exit 1
          fi
          ENV_NAME="${FULL_ENV##* / }"
          ENV_SLUG="${ENV_NAME,,}"
          if [[ -z "$ENV_SLUG" || ! "$ENV_SLUG" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "::error::Could not parse env name from deployment environment: $FULL_ENV"
            exit 1
          fi
          {
            echo "epds_url=https://certified-apppds-core-${ENV_SLUG}.up.railway.app"
            echo "auth_url=https://certified-appauth-service-${ENV_SLUG}.up.railway.app"
            echo "demo_url=https://certified-appdemo-${ENV_SLUG}.up.railway.app"
            echo "mailpit_url=https://mailpit-${ENV_SLUG}.up.railway.app"
          } >> "$GITHUB_OUTPUT"

      - name: Wait for all services
        run: |
          check() {
            local URL=$1
            for i in $(seq 1 30); do
              if curl -sf "$URL" > /dev/null 2>&1; then
                echo "✓ $URL is up"
                return 0
              fi
              echo "  Attempt $i/30 failed, retrying in 10s..."
              sleep 10
            done
            echo "::error::$URL timed out after 5 minutes"
            exit 1
          }
          check "${{ steps.urls.outputs.epds_url }}/health"
          check "${{ steps.urls.outputs.auth_url }}/health"
          check "${{ steps.urls.outputs.demo_url }}"
          check "${{ steps.urls.outputs.mailpit_url }}/readyz"

      - name: Run e2e suite
        env:
          E2E_PDS_URL: ${{ steps.urls.outputs.epds_url }}
          E2E_AUTH_URL: ${{ steps.urls.outputs.auth_url }}
          E2E_DEMO_URL: ${{ steps.urls.outputs.demo_url }}
          E2E_MAILPIT_URL: ${{ steps.urls.outputs.mailpit_url }}
          E2E_MAILPIT_USER: ${{ secrets.E2E_MAILPIT_USER }}
          E2E_MAILPIT_PASS: ${{ secrets.E2E_MAILPIT_PASS }}
          E2E_HEADLESS: 'true'
        run: pnpm test:e2e:headless

      - name: Publish e2e test report
        # Run on both pass and fail so the Checks tab always has the
        # summary and any failing scenarios get file+line annotations
        # on the PR diff. fail-on-error is off so a reporter glitch
        # can't turn a green test run red.
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: e2e cucumber report
          path: reports/e2e.junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload e2e report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: e2e-report
          path: reports/
          retention-days: 2
